<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff4d6d;
            --primary-hover: #ff758f;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ffc8dd, #ffafcc, #bde0fe, #a2d2ff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 { color: #ff4d6d; font-size: 1.8rem; margin-bottom: 25px; }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-height: 200px; /* Platzhalter für wachsenden Button */
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yes-btn {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            z-index: 100;
        }

        #no-btn {
            background-color: #6c757d;
            color: white;
            opacity: 0.8;
        }

        .hidden { display: none !important; }

        img {
    width: 250px; /* Etwas größer für den eckigen Look */
    height: auto; /* Proportional lassen */
    object-fit: cover;
    border-radius: 8px; /* Nur ganz leichte Abrundung für moderne Kanten */
    margin-bottom: 20px;
    border: 5px solid white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

        /* Hintergrund-Deko */
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.2);
            font-size: 20px;
            user-select: none;
            animation: float 6s linear infinite;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="glass-card" id="main-card">
        <img src="D:\Screenshot_20260204_140515_Instagram.jpg" alt="Cute">
        <h1 id="question-text">Neele willst du mein Valentin sein?</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">JA!</button>
            <button id="no-btn" onclick="shrinkNo()">Nein</button>
        </div>
    </div>

    <div class="glass-card hidden" id="success-card">
        <img src="D:\Screenshot_20260204_140515_Instagram.jpg" alt="Happy">
        <h1>Glück gehabt! 🥰</h1>
        <p>Ich wusste, dass du die richtige Entscheidung triffst.</p>
        <p><b>Termin ist im Kalender geblockt!</b></p>
    </div>

    <script>
        let yesScale = 1;
        let noScale = 1;

        // Hintergrund-Herzen generieren
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 500);

        function shrinkNo() {
            yesScale += 0.4;
            document.getElementById('yes-btn').style.transform = `scale(${yesScale})`;
            
            noScale -= 0.15;
            if (noScale < 0.3) noScale = 0.3;
            document.getElementById('no-btn').style.transform = `scale(${noScale})`;
            
            const texts = ["Bist du sicher Neo?", "Ich pack dich!", "Denk nochmal nach, Neele", "Lieber Arne?...", "Letzte Chance!"];
            document.getElementById('no-btn').innerText = texts[Math.floor(Math.random() * texts.length)];
        }

        function celebrate() {
            document.getElementById('main-card').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');

            const duration = 10 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 250);
        }
    </script>
</body>
</html>
