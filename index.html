<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zettelchen für dich...</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    
    <style>
        /* Der Hintergrund (wie ein Tisch) */
        body {
            background-color: #8c7b6d; /* Holz-artiger/neutraler Tisch-Ton */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Caveat', cursive; /* Handschrift-Font aktivieren */
        }

        /* Der Notizzettel */
        .zettel {
            background-color: #faf8f5;
            width: 85%;
            max-width: 400px;
            min-height: 450px;
            position: relative;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.3);
            
            padding: 40px 20px 30px 40px;
            
            /* Kariertes Muster generieren */
            background-image: 
                linear-gradient(#b8d8d8 1px, transparent 1px),
                linear-gradient(90deg, #b8d8d8 1px, transparent 1px);
            background-size: 25px 25px; /* Größe der Kästchen */
            background-position: 0 0;
            
            color: #0f4c81; /* Kugelschreiber-Blau */
        }

        /* Ein roter Randstrich auf dem Papier (wie bei Klausurbögen) */
        .zettel::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 35px;
            width: 2px;
            background-color: #ff7a7a;
        }

        h1 {
            font-size: 2.8rem;
            margin-top: 10px;
            margin-bottom: 30px;
            line-height: 1.2;
            z-index: 1;
            position: relative;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-start; /* Linksbündig anordnen */
            position: relative;
            z-index: 1;
        }

        /* Button-Design im Kuli-Style */
        button {
            background: transparent;
            border: 2px solid transparent;
            color: #0f4c81; /* Kuli-Blau */
            font-family: 'Caveat', cursive;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: center;
        }

        /* Die Fake-Ankreuzkästchen */
        .box {
            display: inline-block;
            width: 25px;
            height: 25px;
            border: 2px solid #0f4c81; /* Kuli-Rahmen */
            margin-right: 15px;
            border-radius: 3px;
        }

        #btn-ja {
            font-size: 2.5rem;
        }

        #btn-nein {
            font-size: 2.5rem;
        }

        /* Wenn sie Ja sagt */
        #erfolg {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 50px;
        }

        #erfolg h1 {
            font-size: 4rem;
            color: #d90429; /* Roter Kuli fürs Herz */
        }

    </style>
</head>
<body>

    <div class="zettel">
        <div id="frage-container">
            <h1>Willst du meine Freundin sein?</h1>
            
            <div class="buttons">
                <button id="btn-ja">
                    <span class="box" id="box-ja"></span> Ja
                </button>
                <button id="btn-nein">
                    <span class="box" id="box-nein"></span> Nein
                </button>
            </div>
        </div>

        <div id="erfolg">
            <h1>❤️ JA ❤️</h1>
            <p style="font-size: 2rem;">(Kreuz ist gesetzt!)</p>
        </div>
    </div>

    <script>
        let jaGroesse = 2.5;
        let neinGroesse = 2.5;
        let boxJaGroesse = 25;
        let boxNeinGroesse = 25;
        let klicksAufNein = 0;

        const neinTexte = [
            "Nein",
            "Sicher?",
            "Verklickt?",
            "Denk nochmal nach!",
            "Falscher Kasten!",
            "Jetzt wird's eng...",
            "Nur noch Ja passt!"
        ];

        const btnJa = document.getElementById('btn-ja');
        const btnNein = document.getElementById('btn-nein');
        const boxJa = document.getElementById('box-ja');
        const boxNein = document.getElementById('box-nein');
        const frageContainer = document.getElementById('frage-container');
        const erfolgContainer = document.getElementById('erfolg');

        btnNein.addEventListener('click', () => {
            klicksAufNein++;
            
            // Ja wird größer
            jaGroesse += 0.8; 
            boxJaGroesse += 8;
            
            // Nein wird kleiner
            neinGroesse -= 0.3; 
            boxNeinGroesse -= 3;

            // Limit, damit Nein nicht unsichtbar wird
            if (neinGroesse < 0.5) neinGroesse = 0.5; 
            if (boxNeinGroesse < 5) boxNeinGroesse = 5;

            // Größen anwenden
            btnJa.style.fontSize = jaGroesse + 'rem';
            boxJa.style.width = boxJaGroesse + 'px';
            boxJa.style.height = boxJaGroesse + 'px';
            
            btnNein.style.fontSize = neinGroesse + 'rem';
            boxNein.style.width = boxNeinGroesse + 'px';
            boxNein.style.height = boxNeinGroesse + 'px';

            // Text anpassen
            if (klicksAufNein < neinTexte.length) {
                // Das span (die Kästchen-Box) muss erhalten bleiben beim Text-Ändern
                btnNein.innerHTML = `<span class="box" id="box-nein" style="width: ${boxNeinGroesse}px; height: ${boxNeinGroesse}px;"></span> ` + neinTexte[klicksAufNein];
            } else {
                btnNein.innerHTML = `<span class="box" id="box-nein" style="width: ${boxNeinGroesse}px; height: ${boxNeinGroesse}px;"></span> ...`;
            }
        });

        btnJa.addEventListener('click', () => {
            // Zeigt ein X im "Ja"-Kasten, bevor der Text wechselt
            boxJa.style.backgroundColor = "#0f4c81"; 
            
            setTimeout(() => {
                frageContainer.style.display = 'none';
                erfolgContainer.style.display = 'flex';
            }, 300); // 0.3 Sekunden warten für den Effekt
        });
    </script>
</body>
</html>
